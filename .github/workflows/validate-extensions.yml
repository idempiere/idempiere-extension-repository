name: Validate Extension Metadata

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Validate JSON Structure and Required Fields
        run: |
          import json
          import os
          import sys

          errors = []
          # Path to your extensions folder
          extensions_path = 'extensions'

          if not os.path.exists(extensions_path):
              print(f"Directory {extensions_path} not found.")
              sys.exit(0)

          for root, dirs, files in os.walk(extensions_path):
              for file in files:
                  if file == 'metadata.json':
                      file_path = os.path.join(root, file)
                      print(f"Validating {file_path}...")
                      
                      try:
                          with open(file_path, 'r') as f:
                              data = json.load(f)
                              
                          # Define required keys
                          required_keys = ['id', 'name', 'version', 'idempiereVersion', 'bundles']
                          for key in required_keys:
                              if key not in data:
                                  errors.append(f"Missing key '{key}' in {file_path}")
                          
                          # Validate bundles list
                          if 'bundles' in data:
                              if not isinstance(data['bundles'], list) or len(data['bundles']) == 0:
                                  errors.append(f"'bundles' must be a non-empty list in {file_path}")
                              else:
                                  for idx, bundle in enumerate(data['bundles']):
                                      if 'symbolicName' not in bundle or 'downloadUrl' not in bundle:
                                          errors.append(f"Bundle at index {idx} in {file_path} missing 'symbolicName' or 'downloadUrl'")

                      except json.JSONDecodeError as e:
                          errors.append(f"Invalid JSON in {file_path}: {str(e)}")
                      except Exception as e:
                          errors.append(f"Error processing {file_path}: {str(e)}")

          if errors:
              print("\nValidation Failed:")
              for error in errors:
                  print(f"  - {error}")
              sys.exit(1)
          else:
              print("\nAll metadata files are valid!")
        shell: python
